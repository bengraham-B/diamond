<div class="card">
    <p-table
        #dt1
        [value]="transactions()"
        dataKey="id"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        [loading]="loading()"
        [paginator]="false"
        [globalFilterFields]="['DAY', 'DETAILS', 'MONTH_NAME', 'GL_ACCOUNT_NAME']"
        showGridlines
        [scrollable]="true"
        scrollHeight="800px"
        styleClass="p-datatable-sm"
    >
        <!-- Caption / toolbar -->
        <ng-template #caption>
            <div class="flex">
                <p-button label="Clear" [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt1)" />
                <p-iconfield iconPosition="left" class="ml-auto">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input
                            pInputText
                            type="text"
                            (input)="dt1.filterGlobal(getInputValue($event), 'contains')"
                            placeholder="Search keyword"
                    />
                </p-iconfield>
            </div>
        </ng-template>
        
        <!-- Header -->
        <ng-template #header>
            <tr>
                <th style="min-width:2rem">
                    <div class="flex items-center justify-between">
                        Day
                        <p-columnFilter type="text" field="DAY" display="menu" />
                    </div>
                </th>
                
                <th style="min-width:8rem">
                    <div class="flex items-center justify-between">
                        Month
                        <p-columnFilter type="text" field="MONTH_NAME" display="menu" />
                    </div>
                </th>
                
                <th style="min-width:18rem">
                    <div class="flex items-center justify-between">
                        Details
                        <p-columnFilter type="text" field="DETAILS" display="menu" />
                    </div>
                </th>
                
                <th style="min-width:10rem">
                    <div class="flex items-center justify-between">
                        Date
                        <p-columnFilter type="date" field="DATE" display="menu" />
                    </div>
                </th>
                
                <th style="min-width:10rem">
                    <div class="flex items-center justify-between">
                        Amount
                        <p-columnFilter type="numeric" field="AMOUNT" display="menu" currency="ZAR" />
                    </div>
                </th>
                
                <th style="min-width:14rem">
                    <div class="flex items-center justify-between">
                        GL Account
                        <p-columnFilter
                                field="GL_ACCOUNT_NAME"
                                matchMode="in"
                                display="menu"
                                [showMatchModes]="false"
                                [showOperator]="false"
                                [showAddButton]="false"
                        >
                            <ng-template #filter let-value let-filter="filterCallback">
                                <p-multiselect
                                        [ngModel]="value"
                                        (ngModelChange)="filter($event)"
                                        [options]="glAccounts()"
                                        optionLabel="label"
                                        optionValue="value"
                                        placeholder="Any"
                                        style="min-width: 14rem"
                                        [panelStyle]="{ minWidth: '16rem' }"
                                >
                                    <ng-template let-option #item>
                                        <p-tag [value]="option.label" [severity]="getSeverity(option.value)" />
                                    </ng-template>
                                </p-multiselect>
                            </ng-template>
                        </p-columnFilter>
                    </div>
                </th>
                
                <th style="width: 5rem">
                    <div class="flex items-center justify-between">
                        Type
                        <p-columnFilter type="boolean" field="TYPE" display="menu" />
                    </div>
                </th>
            </tr>
        </ng-template>
        
        <!-- Body -->
        <ng-template #body let-TXN>
            <tr>
                <td>{{ TXN.DAY }}</td>
                
                <td>{{ TXN.MONTH_NAME }}</td>
                
                <td>{{ TXN.DETAILS }}</td>
                
                <td>{{ TXN.DATE | date: 'MM/dd/yyyy' }}</td>
                
                <td>{{ TXN.AMOUNT | currency: 'R' : 'symbol' }}</td>
                
                <td>
                    <p-tag [value]="TXN.GL_ACCOUNT_NAME" [severity]="getSeverity(TXN.GL_ACCOUNT_NAME)" />
                </td>
                
                <td class="text-center">
                    <i
                            class="pi"
                            [ngClass]="{
                            'text-green-500 pi-check-circle': TXN.TYPE,
                            'text-red-500 pi-times-circle': !TXN.TYPE
                        }"
                    ></i>
                </td>
            </tr>
        </ng-template>
        
        <!-- Empty state -->
        <ng-template #emptymessage>
            <tr>
                <td colspan="7">No transactions found.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
